<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏合集 · Web Games</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23101318'/%3E%3Crect x='20' y='20' width='26' height='26' rx='5' fill='%23AC8FBF'/%3E%3Crect x='54' y='20' width='26' height='26' rx='5' fill='%237FB4C9'/%3E%3Crect x='20' y='54' width='26' height='26' rx='5' fill='%23C9A178'/%3E%3Crect x='54' y='54' width='26' height='26' rx='5' fill='%238FB48B'/%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0E1013;           /* 页面背景 */
    --surface:#15181D;      /* 面板/卡片 */
    --surface-2:#1C2027;    /* 嵌套面板、hover */
    --border:#262B33;       /* 1px 实线边框 */
    --border-strong:#343B45;
    --text:#E7E9EC;
    --text-2:#9BA1AA;       /* 次级文字 */
    --text-3:#646B75;       /* 三级文字/小标签 */
    --accent:#C9B08A;       /* 唯一强调色（香槟暖砂） */
    --danger:#C76A6A;
    --ok:#7FA886;
    --radius:10px; --radius-sm:6px;
  }
  html{ -webkit-text-size-adjust:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5;
    font-variant-numeric:tabular-nums;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:1080px; margin:0 auto; padding:56px 24px 72px; }

  /* 顶部 */
  header{ text-align:center; margin-bottom:44px; }
  .badge{
    display:inline-flex; align-items:center; font-size:11px; font-weight:500;
    color:var(--text-3); background:var(--surface); border:1px solid var(--border);
    padding:4px 12px; border-radius:999px; letter-spacing:.08em; margin-bottom:16px;
  }
  h1{ font-size:26px; font-weight:600; letter-spacing:-.2px; line-height:1.2; }
  h1 .en{ display:block; font-size:11px; font-weight:500; color:var(--text-3);
    letter-spacing:.08em; text-transform:uppercase; margin-top:8px; }
  .lead{ font-size:14px; color:var(--text-2); margin-top:12px; }

  /* 网格 */
  .grid{ display:grid; gap:20px; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); }

  /* 卡片 */
  .card{
    display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden; text-decoration:none; color:inherit;
    transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  .card:hover{ transform:translateY(-2px); border-color:var(--border-strong); box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .card:focus-visible{ outline:1px solid var(--accent); outline-offset:2px; }
  .cover{ aspect-ratio:16/10; overflow:hidden; background:#101318; border-bottom:1px solid var(--border); }
  .cover svg{ display:block; width:100%; height:100%; }
  .body{ padding:16px 16px 4px; flex:1; }
  .card-head{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .card-head h2{ font-size:16px; font-weight:600; letter-spacing:-.2px; }
  .card-head .en{ font-size:11px; font-weight:500; color:var(--text-3); letter-spacing:.08em; text-transform:uppercase; }
  .desc{ font-size:13px; color:var(--text-2); margin-top:8px; line-height:1.6; }
  .tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .tag{ font-size:11px; padding:2px 8px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--text-2); }
  .foot{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; margin-top:8px; border-top:1px solid var(--border);
    font-size:13px; font-weight:500; color:var(--text-2);
    transition:color .16s ease;
  }
  .card:hover .foot{ color:var(--text); }
  .foot .arrow{ transition:transform .16s ease; }
  .card:hover .foot .arrow{ transform:translateX(2px); }

  /* 占位卡 */
  .card.soon{
    align-items:center; justify-content:center; text-align:center; min-height:260px;
    background:transparent; border:1px dashed var(--border-strong); box-shadow:none; cursor:default; padding:24px;
  }
  .card.soon:hover{ transform:none; box-shadow:none; border-color:var(--border-strong); }
  .card.soon .plus{ font-size:30px; color:var(--text-3); font-weight:300; line-height:1; margin-bottom:12px; }
  .card.soon .t{ font-size:13px; font-weight:500; color:var(--text-2); }
  .card.soon .s{ font-size:12px; color:var(--text-3); margin-top:4px; }

  footer{ text-align:center; margin-top:48px; font-size:12px; color:var(--text-3); }

  @media (max-width:560px){
    .wrap{ padding:40px 16px 56px; }
    h1{ font-size:22px; }
    .grid{ gap:16px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="badge">零依赖 · 开箱即玩</span>
      <h1>游戏合集<span class="en">Web Games</span></h1>
      <p class="lead">精致的网页小游戏,点开即玩,无需安装。</p>
    </header>

    <main class="grid" id="grid"></main>

    <footer>使用 HTML5 Canvas 构建 · 支持桌面与移动端</footer>
  </div>

<script>
  // 用方块数据生成卡片封面 SVG(深色棋盘底 + 低饱和纯平色块)
  function blocksCover(blocks){
    const C=40, P=2, S=36, R=5;          // 单元格 40px,方块 36px,圆角 5
    const W=320, H=200;
    let lines='';
    for(let x=0;x<=W;x+=C) lines+=`<line x1="${x}" y1="0" x2="${x}" y2="${H}"/>`;
    for(let y=0;y<=H;y+=C) lines+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}"/>`;
    const cells = blocks.map(([c,r,col])=>
      `<rect x="${c*C+P}" y="${r*C+P}" width="${S}" height="${S}" rx="${R}" fill="${col}" stroke="rgba(0,0,0,.25)" stroke-width="1"/>`
    ).join('');
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <rect width="${W}" height="${H}" fill="#101318"/>
      <g stroke="#1A1E24" stroke-width="1">${lines}</g>
      ${cells}
    </svg>`;
  }

  // 游戏列表:新增游戏只需在此追加一项
  const games = [
    {
      title:'俄罗斯方块', en:'Tetris', path:'tetris/index.html',
      desc:'经典 SRS 旋转 · T-Spin · Combo 连击 · 支持触屏。',
      tags:['益智','经典','单人'],
      cover: blocksCover([
        // 下落中的 T 块
        [3,0,'#AC8FBF'],[2,1,'#AC8FBF'],[3,1,'#AC8FBF'],[4,1,'#AC8FBF'],
        // 堆叠
        [1,3,'#8FB48B'],[2,3,'#C9A178'],[4,3,'#7FB4C9'],[5,3,'#CBBD7E'],
        [1,4,'#7E93C4'],[2,4,'#C9A178'],[3,4,'#C48A8A'],[4,4,'#7FB4C9'],[5,4,'#CBBD7E'],[6,4,'#8FB48B'],
      ]),
    },
    {
      title:'贪吃蛇', en:'Snake', path:'snake/index.html',
      desc:'四种模式 · 道具连击 · 金苹果 · 平滑插值移动,支持触屏。',
      tags:['休闲','经典','单人'],
      cover: blocksCover([
        // 蜿蜒的蛇身(尾→头,沿身体微调明度)
        [1,1,'#839A88'],[2,1,'#839A88'],[3,1,'#8FA694'],
        [3,2,'#8FA694'],
        [3,3,'#9BB2A0'],[4,3,'#9BB2A0'],[5,3,'#DFE3E8'],
        // 食物
        [6,3,'#C76A6A'],
      ]),
    },
    {
      title:'扫雷', en:'Minesweeper', path:'minesweeper/index.html',
      desc:'经典三档难度 · 首点安全 · 旗子标记 · 数字格快捷展开,支持触屏。',
      tags:['益智','经典','单人'],
      cover: blocksCover([
        // 未翻开的格子,夹杂数字格、旗子与雷
        [0,1,'#1C2027'],[1,1,'#1C2027'],[2,1,'#7E93C4'],[3,1,'#1C2027'],[4,1,'#C9B08A'],[5,1,'#1C2027'],[6,1,'#1C2027'],
        [0,2,'#1C2027'],[1,2,'#8FB48B'],[4,2,'#1C2027'],[5,2,'#7E93C4'],[6,2,'#1C2027'],
        [0,3,'#1C2027'],[1,3,'#1C2027'],[2,3,'#C48A8A'],[3,3,'#1C2027'],[4,3,'#1C2027'],[5,3,'#C76A6A'],[6,3,'#1C2027'],
      ]),
    },
    {
      title:'赵云与阿斗', en:'Zhao Yun & A Dou', path:'zhaoyun-adou/index.html',
      desc:'LayaAir 竖屏三国塔防 · 云存档 · 好友实时生存赛 · 总排行榜。',
      tags:['塔防','好友对战','云存档'],
      cover: blocksCover([
        // 长枪与赵云
        [2,0,'#C9B08A'],[2,1,'#C9B08A'],[2,2,'#D8DCE2'],
        [1,2,'#7E93C4'],[2,3,'#7E93C4'],[1,3,'#6F84B5'],
        // 阿斗
        [3,3,'#C9A178'],[3,4,'#B58F68'],
        // 追兵
        [5,1,'#C48A8A'],[6,1,'#C48A8A'],[5,2,'#A96363'],[6,3,'#A96363'],
        // 战场地面
        [0,4,'#1C2027'],[1,4,'#1C2027'],[4,4,'#1C2027'],[5,4,'#1C2027'],[6,4,'#1C2027'],[7,4,'#1C2027'],
      ]),
    },
  ];

  const grid = document.getElementById('grid');
  games.forEach(g=>{
    const a = document.createElement('a');
    a.className='card'; a.href=g.path; a.setAttribute('aria-label', g.title);
    a.innerHTML = `
      <div class="cover">${g.cover}</div>
      <div class="body">
        <div class="card-head"><h2>${g.title}</h2><span class="en">${g.en}</span></div>
        <p class="desc">${g.desc}</p>
        <div class="tags">${g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="foot"><span>开始游戏</span><span class="arrow">→</span></div>`;
    grid.appendChild(a);
  });

  // 开发中占位卡
  const soon = document.createElement('div');
  soon.className='card soon';
  soon.innerHTML = `<div class="plus">+</div><div class="t">更多游戏开发中</div><div class="s">敬请期待</div>`;
  grid.appendChild(soon);
</script>
</body>
</html>
