<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>扫雷</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%2315181D'/%3E%3Crect x='18' y='18' width='18' height='18' rx='4' fill='%231C2027'/%3E%3Crect x='41' y='18' width='18' height='18' rx='4' fill='%23C9B08A'/%3E%3Crect x='64' y='18' width='18' height='18' rx='4' fill='%231C2027'/%3E%3Crect x='18' y='41' width='18' height='18' rx='4' fill='%231C2027'/%3E%3Ccircle cx='50' cy='50' r='8' fill='%23C76A6A'/%3E%3Crect x='64' y='41' width='18' height='18' rx='4' fill='%231C2027'/%3E%3Crect x='18' y='64' width='18' height='18' rx='4' fill='%231C2027'/%3E%3Crect x='41' y='64' width='18' height='18' rx='4' fill='%231C2027'/%3E%3Crect x='64' y='64' width='18' height='18' rx='4' fill='%231C2027'/%3E%3C/svg%3E">
<style>
  /* ── 基础 ── */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0E1013;           /* 页面背景 */
    --surface:#15181D;      /* 面板/卡片 */
    --surface-2:#1C2027;    /* 嵌套面板、hover、未翻开格 */
    --border:#262B33;       /* 1px 实线边框 */
    --border-strong:#343B45;
    --text:#E7E9EC;
    --text-2:#9BA1AA;       /* 次级文字 */
    --text-3:#646B75;       /* 三级文字/小标签 */
    --accent:#C9B08A;       /* 唯一强调色（香槟暖砂） */
    --danger:#C76A6A;       /* 失败/雷 */
    --ok:#7FA886;           /* 胜利/成功 */
    --radius:10px;
    --radius-sm:6px;
    --board-bg:#101318;     /* 棋盘底色（比 surface 更深一档） */
    --grid-line:#1A1E24;    /* 棋盘格线 */
    --cell:32px;
    --gap:4px;
  }
  html{height:100%;-webkit-text-size-adjust:100%}
  body{
    min-height:100%;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    color:var(--text);
    background:var(--bg);
    overflow-x:hidden;
  }
  button{font:inherit}
  .app{width:min(1180px,100%);margin:0 auto;padding:24px 20px 40px}

  /* ── 页头：返回链接 + 游戏名 + 主按钮 ── */
  .topbar{display:flex;align-items:center;gap:16px;padding:4px 0 24px}
  .back{
    font-size:13px;
    color:var(--text-3);
    text-decoration:none;
    transition:color .15s ease;
  }
  .back:hover{color:var(--text-2)}
  .back:focus-visible{outline:1px solid var(--accent);outline-offset:2px}
  .title{
    margin-right:auto;
    font-size:17px;
    font-weight:600;
    letter-spacing:-.2px;
    line-height:1.2;
  }
  .new-btn{
    min-height:36px;
    padding:0 18px;
    cursor:pointer;
    border:none;
    border-radius:var(--radius-sm);
    font-size:13px;
    font-weight:600;
    color:#0E1013;
    background:var(--accent);
    transition:background .15s ease;
  }
  .new-btn:hover{background:#D5BE9B}      /* 提亮约 6% */
  .new-btn:active{background:#BFA67F}
  .new-btn:focus-visible{outline:1px solid var(--accent);outline-offset:2px}

  .game{display:flex;flex-direction:column;gap:12px}

  /* ── 控制台 ── */
  .control-strip{
    display:grid;
    grid-template-columns:minmax(290px,1.15fr) minmax(320px,1fr);
    gap:12px;
    align-items:stretch;
  }
  .difficulty{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:8px;
    min-width:0;
  }
  .difficulty button{
    cursor:pointer;
    padding:10px 12px;
    text-align:left;
    overflow:hidden;
    min-width:0;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--surface);
    transition:background .15s ease,border-color .15s ease,color .15s ease;
  }
  .difficulty button:hover{background:var(--surface-2);border-color:var(--border-strong)}
  .difficulty button:focus-visible{outline:1px solid var(--accent);outline-offset:2px}
  .difficulty strong{
    display:block;
    font-size:14px;
    font-weight:600;
    line-height:1.2;
    white-space:nowrap;
    color:var(--text);
    transition:color .15s ease;
  }
  .difficulty span{
    display:block;
    margin-top:4px;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--text-3);
    white-space:nowrap;
  }
  /* 选中态：细边框 + 强调色文字，不做满底色 */
  .difficulty button[aria-pressed="true"]{border-color:var(--accent);background:var(--surface)}
  .difficulty button[aria-pressed="true"] strong{color:var(--accent)}

  /* ── 状态数字 ── */
  .stats{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:8px;
  }
  .stat{
    min-width:0;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--surface);
  }
  .stat .label{
    display:block;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--text-3);
    white-space:nowrap;
  }
  .stat .value{
    display:block;
    margin-top:4px;
    font-size:22px;
    font-weight:600;
    line-height:1.1;
    font-variant-numeric:tabular-nums;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #bestCounter{color:var(--accent)}      /* 最佳记录用强调色 */

  /* ── 状态行 ── */
  .status-line{
    display:flex;
    align-items:center;
    gap:12px;
    min-height:40px;
    padding:9px 16px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--surface);
  }
  .status-text{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:500;
    color:var(--text-2);
    transition:color .15s ease;
  }
  .status-text::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--text-3);
    transition:background .15s ease;
  }
  .status-text.won{color:var(--ok)}
  .status-text.won::before{background:var(--ok)}
  .status-text.lost{color:var(--danger)}
  .status-text.lost::before{background:var(--danger)}

  /* ── 棋盘容器（大棋盘横向滚动） ── */
  .board-viewport{
    width:100%;
    overflow:auto;
    padding:16px;
    background:var(--board-bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    -webkit-overflow-scrolling:touch;
  }
  .board{
    display:grid;
    grid-template-columns:repeat(var(--cols),var(--cell));
    gap:var(--gap);
    width:max-content;
    margin:0 auto;
    touch-action:pan-x pan-y;
  }

  /* ── 单元格：未翻开 ── */
  .cell{
    width:var(--cell);
    height:var(--cell);
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid var(--border);
    border-radius:4px;
    background:var(--surface-2);
    color:var(--text);
    cursor:pointer;
    user-select:none;
    font-size:calc(var(--cell) * .5);
    font-weight:600;
    line-height:1;
    font-variant-numeric:tabular-nums;
    transition:background .12s ease,border-color .12s ease;
  }
  .cell:hover{background:#232830;border-color:var(--border-strong)}
  .cell:active{background:#181C22}
  .cell:focus-visible{
    position:relative;
    z-index:2;
    outline:1px solid var(--accent);
    outline-offset:-1px;
  }

  /* ── 翻开格：深一档底色，格线描边 ── */
  .cell.revealed,
  .cell.revealed:hover{
    cursor:default;
    background:var(--board-bg);
    border-color:var(--grid-line);
  }
  .cell.revealed{animation:cell-open .16s ease}
  @keyframes cell-open{from{opacity:.4}to{opacity:1}}

  /* ── 数字 1-8（低饱和色板，无发光） ── */
  .cell.n1{color:#7E93C4}
  .cell.n2{color:#8FB48B}
  .cell.n3{color:#C48A8A}
  .cell.n4{color:#AC8FBF}
  .cell.n5{color:#C9A178}
  .cell.n6{color:#7FB4C9}
  .cell.n7{color:#9BA1AA}
  .cell.n8{color:#646B75}

  /* ── 旗子：强调色字符，不做满底色 ── */
  .cell.flagged{color:var(--accent);border-color:var(--border-strong)}

  /* ── 雷 ── */
  .cell.mine,
  .cell.mine:hover{
    color:#0E1013;
    background:var(--danger);
    border-color:var(--danger);
  }
  /* 引爆的那颗雷略亮一档 */
  .cell.mine.exploded,
  .cell.mine.exploded:hover{
    background:#D47C7C;
    border-color:#D47C7C;
  }

  /* ── 错误旗（失败后） ── */
  .cell.bad-flag,
  .cell.bad-flag:hover{
    cursor:default;
    color:var(--danger);
    background:var(--board-bg);
    border-color:var(--grid-line);
  }

  /* ── 数字快捷展开失败的轻微抖动 ── */
  .cell.bump{animation:bump .18s ease}
  @keyframes bump{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}

  /* ── 响应式（高级难度横向滚动，格宽 ≥32px） ── */
  @media (max-width:760px){
    :root{--cell:34px;--gap:4px}
    .app{padding:16px 12px 28px}
    .topbar{gap:12px;padding-bottom:16px}
    .title{font-size:16px}
    .new-btn{padding:0 14px}
    .control-strip{grid-template-columns:1fr}
    .difficulty button{padding:8px 10px}
    .difficulty strong{font-size:13px}
    .difficulty span{font-size:10px}
    .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
    .stat .value{font-size:20px}
    .board-viewport{padding:12px}
  }
  @media (max-width:380px){
    :root{--cell:32px;--gap:3px}
  }
  @media (prefers-reduced-motion:reduce){
    .cell.revealed,.cell.bump{animation:none}
  }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="back" href="../index.html">← 返回合集</a>
      <h1 class="title">扫雷</h1>
      <button class="new-btn" id="newGame" type="button">新局</button>
    </header>

    <main class="game">
      <section class="control-strip" aria-label="扫雷控制台">
        <div class="difficulty" id="difficulty" role="group" aria-label="难度">
          <button type="button" data-difficulty="beginner">
            <strong>初级</strong><span>9×9 · 10 雷</span>
          </button>
          <button type="button" data-difficulty="intermediate">
            <strong>中级</strong><span>16×16 · 40 雷</span>
          </button>
          <button type="button" data-difficulty="expert">
            <strong>高级</strong><span>30×16 · 99 雷</span>
          </button>
        </div>

        <div class="stats" aria-label="游戏状态">
          <div class="stat"><span class="label">Mines</span><span class="value" id="mineCounter">10</span></div>
          <div class="stat"><span class="label">Time</span><span class="value" id="timeCounter">0</span></div>
          <div class="stat"><span class="label">Best</span><span class="value" id="bestCounter">--</span></div>
          <div class="stat"><span class="label">Open</span><span class="value" id="openCounter">0</span></div>
        </div>
      </section>

      <div class="status-line" aria-live="polite">
        <span class="status-text" id="statusText">待开局</span>
      </div>

      <section class="board-viewport" id="boardViewport" aria-label="扫雷棋盘区域">
        <div class="board" id="board" role="grid" aria-label="扫雷棋盘"></div>
      </section>
    </main>
  </div>

<script>
(function(){
  "use strict";

  const DIFFICULTIES = {
    beginner: { label: "初级", rows: 9, cols: 9, mines: 10 },
    intermediate: { label: "中级", rows: 16, cols: 16, mines: 40 },
    expert: { label: "高级", rows: 16, cols: 30, mines: 99 },
  };
  const BEST_PREFIX = "mini-games-minesweeper-best-";
  const LONG_PRESS_MS = 430;
  const MOVE_CANCEL_PX = 10;

  const boardEl = document.getElementById("board");
  const mineCounter = document.getElementById("mineCounter");
  const timeCounter = document.getElementById("timeCounter");
  const bestCounter = document.getElementById("bestCounter");
  const openCounter = document.getElementById("openCounter");
  const statusText = document.getElementById("statusText");
  const difficultyEl = document.getElementById("difficulty");
  const newGameBtn = document.getElementById("newGame");

  let difficultyKey = "beginner";
  let config = DIFFICULTIES[difficultyKey];
  let cells = [];
  let status = "ready";
  let firstReveal = true;
  let revealedSafe = 0;
  let flaggedCount = 0;
  let elapsedSeconds = 0;
  let startedAt = 0;
  let timerId = 0;
  let longPressTimer = 0;
  let pointerStart = null;
  let suppressClick = { index: -1, until: 0 };

  function createCells(){
    return Array.from({ length: config.rows * config.cols }, function(_, index){
      return {
        index,
        mine: false,
        adjacent: 0,
        revealed: false,
        flagged: false,
        exploded: false,
        badFlag: false,
      };
    });
  }

  function rowOf(index){ return Math.floor(index / config.cols); }
  function colOf(index){ return index % config.cols; }
  function inBounds(row,col){ return row >= 0 && row < config.rows && col >= 0 && col < config.cols; }
  function indexOf(row,col){ return row * config.cols + col; }

  function neighbors(index){
    const row = rowOf(index);
    const col = colOf(index);
    const result = [];
    for(let dr = -1; dr <= 1; dr++){
      for(let dc = -1; dc <= 1; dc++){
        if(dr === 0 && dc === 0) continue;
        const nr = row + dr;
        const nc = col + dc;
        if(inBounds(nr,nc)) result.push(indexOf(nr,nc));
      }
    }
    return result;
  }

  function safeZone(index){
    return new Set([index].concat(neighbors(index)));
  }

  function shuffle(items){
    for(let i = items.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = items[i];
      items[i] = items[j];
      items[j] = tmp;
    }
    return items;
  }

  function placeMines(firstIndex){
    const blocked = safeZone(firstIndex);
    const candidates = cells.map(function(cell){ return cell.index; }).filter(function(index){
      return !blocked.has(index);
    });
    shuffle(candidates).slice(0, config.mines).forEach(function(index){
      cells[index].mine = true;
    });
    cells.forEach(function(cell){
      cell.adjacent = neighbors(cell.index).filter(function(n){ return cells[n].mine; }).length;
    });
  }

  function startTimer(){
    startedAt = Date.now();
    elapsedSeconds = 0;
    updateCounters();
    timerId = window.setInterval(function(){
      elapsedSeconds = Math.floor((Date.now() - startedAt) / 1000);
      timeCounter.textContent = String(elapsedSeconds);
    }, 250);
  }

  function stopTimer(){
    if(timerId){
      window.clearInterval(timerId);
      timerId = 0;
    }
    if(status === "playing"){
      elapsedSeconds = Math.floor((Date.now() - startedAt) / 1000);
    }
  }

  function bestKey(){ return BEST_PREFIX + difficultyKey; }

  function readBest(){
    try{
      const value = window.localStorage.getItem(bestKey());
      return value === null ? null : Number(value);
    }catch(error){
      return null;
    }
  }

  function saveBest(seconds){
    const current = readBest();
    if(current !== null && current <= seconds) return;
    try{
      window.localStorage.setItem(bestKey(), String(seconds));
    }catch(error){
      return;
    }
  }

  function updateCounters(){
    mineCounter.textContent = String(config.mines - flaggedCount);
    timeCounter.textContent = String(elapsedSeconds);
    const best = readBest();
    bestCounter.textContent = best === null ? "--" : String(best);
    openCounter.textContent = String(revealedSafe);
  }

  function setStatus(nextStatus){
    status = nextStatus;
    statusText.className = "status-text";
    if(status === "ready"){
      statusText.textContent = "待开局";
    }else if(status === "playing"){
      statusText.textContent = "进行中";
    }else if(status === "won"){
      statusText.textContent = "胜利";
      statusText.classList.add("won");
    }else if(status === "lost"){
      statusText.textContent = "触雷";
      statusText.classList.add("lost");
    }
  }

  function cellLabel(cell){
    const position = "第 " + (rowOf(cell.index) + 1) + " 行第 " + (colOf(cell.index) + 1) + " 列";
    if(cell.revealed){
      if(cell.mine) return position + "，雷";
      return position + "，数字 " + cell.adjacent;
    }
    if(cell.flagged) return position + "，旗子";
    return position + "，未翻开";
  }

  function renderCell(cell){
    const button = boardEl.querySelector('[data-index="' + cell.index + '"]');
    if(!button) return;
    button.className = "cell";
    button.textContent = "";
    button.dataset.state = cell.revealed ? "revealed" : "hidden";
    button.dataset.mark = cell.flagged ? "flag" : "";
    button.setAttribute("aria-label", cellLabel(cell));

    if(cell.revealed){
      button.classList.add("revealed");
      if(cell.mine){
        button.classList.add("mine");
        if(cell.exploded) button.classList.add("exploded");
        button.textContent = cell.exploded ? "✹" : "*";
      }else if(cell.adjacent > 0){
        button.classList.add("n" + cell.adjacent);
        button.textContent = String(cell.adjacent);
      }
    }else if(cell.flagged){
      button.classList.add("flagged");
      button.textContent = "⚑";
    }
    if(cell.badFlag){
      button.classList.add("bad-flag");
      button.textContent = "×";
    }
  }

  function renderAll(){
    cells.forEach(renderCell);
    updateCounters();
    Array.from(difficultyEl.querySelectorAll("button")).forEach(function(button){
      const active = button.dataset.difficulty === difficultyKey;
      button.setAttribute("aria-pressed", active ? "true" : "false");
    });
  }

  function buildBoard(){
    boardEl.style.setProperty("--cols", String(config.cols));
    boardEl.setAttribute("aria-rowcount", String(config.rows));
    boardEl.setAttribute("aria-colcount", String(config.cols));
    boardEl.innerHTML = cells.map(function(cell){
      const row = rowOf(cell.index) + 1;
      const col = colOf(cell.index) + 1;
      return '<button class="cell" type="button" role="gridcell" data-index="' + cell.index + '" aria-rowindex="' + row + '" aria-colindex="' + col + '"></button>';
    }).join("");
    renderAll();
  }

  function revealFlood(startIndex){
    const stack = [startIndex];
    const changed = [];
    while(stack.length){
      const index = stack.pop();
      const cell = cells[index];
      if(cell.revealed || cell.flagged) continue;
      cell.revealed = true;
      changed.push(index);
      if(!cell.mine) revealedSafe++;
      if(cell.mine) return { mineIndex: index, changed };
      if(cell.adjacent === 0){
        neighbors(index).forEach(function(nextIndex){
          const next = cells[nextIndex];
          if(!next.revealed && !next.flagged) stack.push(nextIndex);
        });
      }
    }
    return { mineIndex: -1, changed };
  }

  function lose(mineIndex){
    stopTimer();
    cells.forEach(function(cell){
      if(cell.mine) cell.revealed = true;
      if(cell.flagged && !cell.mine) cell.badFlag = true;
      cell.exploded = cell.index === mineIndex;
    });
    setStatus("lost");
    renderAll();
  }

  function win(){
    stopTimer();
    const finalTime = Math.floor((Date.now() - startedAt) / 1000);
    elapsedSeconds = Math.max(0, finalTime);
    cells.forEach(function(cell){
      if(cell.mine && !cell.flagged){
        cell.flagged = true;
        flaggedCount++;
      }
    });
    saveBest(elapsedSeconds);
    setStatus("won");
    renderAll();
  }

  function checkWin(){
    if(revealedSafe === cells.length - config.mines){
      win();
    }else{
      updateCounters();
    }
  }

  function ensureStarted(index){
    if(!firstReveal) return;
    placeMines(index);
    firstReveal = false;
    setStatus("playing");
    startTimer();
  }

  function reveal(index){
    if(status === "lost" || status === "won") return;
    const cell = cells[index];
    if(!cell || cell.flagged) return;
    ensureStarted(index);
    if(cell.revealed){
      quickReveal(index);
      return;
    }
    const result = revealFlood(index);
    if(result.mineIndex >= 0){
      lose(result.mineIndex);
      return;
    }
    result.changed.forEach(function(changedIndex){ renderCell(cells[changedIndex]); });
    checkWin();
  }

  function quickReveal(index){
    if(status !== "playing") return;
    const cell = cells[index];
    if(!cell.revealed || cell.mine || cell.adjacent === 0) return;
    const around = neighbors(index);
    const flags = around.filter(function(nextIndex){ return cells[nextIndex].flagged; }).length;
    if(flags !== cell.adjacent){
      const button = boardEl.querySelector('[data-index="' + index + '"]');
      if(button){
        button.classList.remove("bump");
        void button.offsetWidth;
        button.classList.add("bump");
      }
      return;
    }
    const toReveal = around.filter(function(nextIndex){
      return !cells[nextIndex].flagged && !cells[nextIndex].revealed;
    });
    for(const nextIndex of toReveal){
      const result = revealFlood(nextIndex);
      if(result.mineIndex >= 0){
        lose(result.mineIndex);
        return;
      }
    }
    renderAll();
    checkWin();
  }

  function toggleFlag(index){
    if(status === "lost" || status === "won") return;
    const cell = cells[index];
    if(!cell || cell.revealed) return;
    cell.flagged = !cell.flagged;
    flaggedCount += cell.flagged ? 1 : -1;
    renderCell(cell);
    updateCounters();
  }

  function newGame(nextDifficulty){
    stopTimer();
    if(nextDifficulty) difficultyKey = nextDifficulty;
    config = DIFFICULTIES[difficultyKey];
    cells = createCells();
    firstReveal = true;
    revealedSafe = 0;
    flaggedCount = 0;
    elapsedSeconds = 0;
    setStatus("ready");
    buildBoard();
  }

  function cellFromEvent(event){
    const target = event.target.closest("[data-index]");
    if(!target || !boardEl.contains(target)) return null;
    return { element: target, index: Number(target.dataset.index) };
  }

  boardEl.addEventListener("click", function(event){
    const hit = cellFromEvent(event);
    if(!hit) return;
    if(hit.index === suppressClick.index && Date.now() < suppressClick.until){
      event.preventDefault();
      return;
    }
    reveal(hit.index);
  });

  boardEl.addEventListener("contextmenu", function(event){
    const hit = cellFromEvent(event);
    if(!hit) return;
    event.preventDefault();
    toggleFlag(hit.index);
  });

  boardEl.addEventListener("keydown", function(event){
    const hit = cellFromEvent(event);
    if(!hit) return;
    if(event.key === "Enter" || event.key === " "){
      event.preventDefault();
      reveal(hit.index);
    }else if(event.key.toLowerCase() === "f"){
      event.preventDefault();
      toggleFlag(hit.index);
    }
  });

  boardEl.addEventListener("pointerdown", function(event){
    const hit = cellFromEvent(event);
    if(!hit || event.pointerType === "mouse") return;
    pointerStart = { index: hit.index, x: event.clientX, y: event.clientY };
    window.clearTimeout(longPressTimer);
    longPressTimer = window.setTimeout(function(){
      toggleFlag(hit.index);
      suppressClick = { index: hit.index, until: Date.now() + 700 };
      if(window.navigator.vibrate) window.navigator.vibrate(12);
    }, LONG_PRESS_MS);
  });

  boardEl.addEventListener("pointermove", function(event){
    if(!pointerStart) return;
    const dx = Math.abs(event.clientX - pointerStart.x);
    const dy = Math.abs(event.clientY - pointerStart.y);
    if(dx > MOVE_CANCEL_PX || dy > MOVE_CANCEL_PX){
      window.clearTimeout(longPressTimer);
    }
  });

  ["pointerup","pointercancel","pointerleave"].forEach(function(type){
    boardEl.addEventListener(type, function(){
      window.clearTimeout(longPressTimer);
      pointerStart = null;
    });
  });

  difficultyEl.addEventListener("click", function(event){
    const button = event.target.closest("[data-difficulty]");
    if(!button) return;
    newGame(button.dataset.difficulty);
  });

  newGameBtn.addEventListener("click", function(){
    newGame();
  });

  window.__minesweeper = {
    getState: function(){
      return {
        difficulty: difficultyKey,
        rows: config.rows,
        cols: config.cols,
        mines: config.mines,
        status,
        firstReveal,
        revealedSafe,
        flaggedCount,
        elapsedSeconds,
        cells: cells.map(function(cell){
          return {
            index: cell.index,
            mine: cell.mine,
            adjacent: cell.adjacent,
            revealed: cell.revealed,
            flagged: cell.flagged,
          };
        }),
      };
    },
  };

  newGame();
})();
</script>
</body>
</html>
