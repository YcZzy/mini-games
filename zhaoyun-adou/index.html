<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>赵云与阿斗</title>
    <link rel="stylesheet" href="browser-cloud.css?v=cloud1">
    <link rel="stylesheet" href="browser-pvp.css?v=pvp6">
    <link rel="stylesheet" href="gm-panel.css?v=gm1">
    <style>
        /* 桌面端：居中手机竖屏壳；手机端：铺满可见视口 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0b0f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #phone-shell {
            position: relative;
            /* 设计比 640:1386 ≈ 现代全面屏手机 */
            width: min(100vw, calc(100vh * 640 / 1386));
            height: min(100vh, calc(100vw * 1386 / 640));
            max-width: 100vw;
            max-height: 100vh;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            box-shadow:
                0 0 0 10px #1c1c22,
                0 0 0 12px #3a3a44,
                0 24px 80px rgba(0, 0, 0, 0.55);
            flex-shrink: 0;
        }
        /* 顶部听筒装饰，纯视觉 */
        #phone-shell::before {
            content: "";
            position: absolute;
            z-index: 5;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 92px;
            height: 8px;
            border-radius: 999px;
            background: #15151a;
            pointer-events: none;
        }
        @media (max-aspect-ratio: 640/1386) {
            #phone-shell {
                border-radius: 0;
                box-shadow: none;
            }
            #phone-shell::before { display: none; }
        }
        @media (max-width: 768px), (pointer: coarse) {
            html, body {
                position: fixed;
                inset: 0;
                width: var(--app-width, 100vw);
                height: var(--app-height, 100dvh);
                min-height: -webkit-fill-available;
                background: #000;
            }
            body { display: block; }
            #phone-shell {
                position: fixed;
                inset: 0;
                width: var(--app-width, 100vw);
                height: var(--app-height, 100dvh);
                max-width: none;
                max-height: none;
                border-radius: 0;
                box-shadow: none;
                /* iOS: 移除 will-change 等可能触发额外合成的属性 */
            }
            #phone-shell::before { display: none; }
        }
    </style>
</head>
<body>
    <div id="phone-shell" aria-label="手机竖屏模拟"></div>
    <!--
        运行说明：
        - 本地开发：在项目根目录运行 `python3 -m http.server 8080`，浏览器打开
          http://localhost:8080/mini-games/zhaoyun-adou/index.html
        - 线上部署：将所有文件上传到任意静态托管（GitHub Pages / Vercel / Cloudflare Pages 等），
          直接访问 index.html 即可。
        - 默认以单机模式运行，存档保存在浏览器 localStorage 中。
        - 如需云存档/排行榜/好友对战，部署云后端后配置 window.ZHAOYUN_CLOUD_CONFIG.apiBaseUrl。
        - 加载顺序：GameGlobal → wx 垫片 → game.js（含 weapp-adapter + Laya + 游戏逻辑）。
    -->
    <script>
        // 最先运行：捕获启动期错误，便于排障。
        window.addEventListener('error', function (e) {
            window.__lastError = {
                msg: e.message, filename: e.filename, line: e.lineno, col: e.colno,
                stack: e.error && e.error.stack
            };
            console.error('[BOOT ERROR]', e.message, '\n', e.error && e.error.stack);
        });
        window.addEventListener('unhandledrejection', function (e) {
            window.__lastError = { msg: 'unhandledrejection: ' + (e.reason && (e.reason.message || String(e.reason))), stack: e.reason && e.reason.stack };
            console.error('[BOOT REJECT]', window.__lastError.msg, '\n', e.reason && e.reason.stack);
        });
        // 手机浏览器地址栏 / Fullscreen 会改变可见视口高度；用 visualViewport 同步真实可见尺寸，避免左右黑边。
        // 同时强制同步 Laya stage 尺寸，否则进入全屏后 CSS 画布变高，但 stage 仍停留在旧高度，底部按钮会点不到。
        //
        // iOS 性能优化：visualViewport.resize/scroll 在 iOS Safari 上每帧都触发，
        // 通过 rAF 节流（每帧最多一次）+ setScreenSize 防抖（300ms 内尺寸不变才同步）
        // 避免频繁触发 WebGL canvas resize 导致卡顿。
        (function syncVisibleViewport() {
            var root = document.documentElement;
            var lastWidth = 0;
            var lastHeight = 0;
            var rafPending = false;
            var stageSyncTimer = 0;
            var lastStageWidth = 0;
            var lastStageHeight = 0;
            var STAGE_SYNC_DELAY = 300; // setScreenSize 防抖延迟

            function isMobileLayout() {
                return window.matchMedia && window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;
            }
            function currentSize() {
                var vv = window.visualViewport;
                return {
                    width: Math.round((vv && vv.width) || window.innerWidth || document.documentElement.clientWidth),
                    height: Math.round((vv && vv.height) || window.innerHeight || document.documentElement.clientHeight)
                };
            }
            function syncLayaStage(width, height) {
                if (!isMobileLayout()) return;
                var L = window.Laya;
                if (!L || !L.stage) return;
                // iOS: 限制像素比 ≤2，减少 canvas 填充率
                var pixelRatio = Math.min((L.Browser && L.Browser.pixelRatio) || window.devicePixelRatio || 1, 2);
                var sw = Math.round(width * pixelRatio);
                var sh = Math.round(height * pixelRatio);
                // 只有实际分辨率变化时才调用 setScreenSize（避免无意义的 canvas resize）
                if (sw === lastStageWidth && sh === lastStageHeight) return;
                lastStageWidth = sw;
                lastStageHeight = sh;
                try {
                    if (L.Browser) {
                        L.Browser.clientWidth = width;
                        L.Browser.clientHeight = height;
                        L.Browser.width = sw;
                        L.Browser.height = sh;
                    }
                    L.stage.setScreenSize(sw, sh);
                } catch (e) {}
            }
            function apply() {
                var size = currentSize();
                if (size.width <= 0 || size.height <= 0) return;
                var cssChanged = (size.width !== lastWidth || size.height !== lastHeight);
                lastWidth = size.width;
                lastHeight = size.height;

                // CSS 变量更新：轻量操作，立刻执行
                if (cssChanged) {
                    root.style.setProperty('--app-width', size.width + 'px');
                    root.style.setProperty('--app-height', size.height + 'px');
                }

                // setScreenSize 防抖：只有尺寸稳定 300ms 后才同步 stage
                // iOS 上地址栏收缩过程中尺寸连续变化，延迟到稳定后再 resize canvas
                clearTimeout(stageSyncTimer);
                stageSyncTimer = setTimeout(function () {
                    syncLayaStage(size.width, size.height);
                }, STAGE_SYNC_DELAY);
            }

            // rAF 节流：每帧最多执行一次 apply（iOS visualViewport 事件高频触发）
            function scheduleApply() {
                if (rafPending) return;
                rafPending = true;
                requestAnimationFrame(function () {
                    rafPending = false;
                    apply();
                });
            }

            window.__syncGameViewport = function () {
                rafPending = false;
                lastStageWidth = 0; lastStageHeight = 0; // 强制立即同步
                var size = currentSize();
                if (size.width <= 0 || size.height <= 0) return;
                lastWidth = size.width;
                lastHeight = size.height;
                root.style.setProperty('--app-width', size.width + 'px');
                root.style.setProperty('--app-height', size.height + 'px');
                clearTimeout(stageSyncTimer);
                syncLayaStage(size.width, size.height);
            };

            // 首次立即执行
            apply();

            window.addEventListener('resize', scheduleApply, { passive: true });
            window.addEventListener('fullscreenchange', scheduleApply, { passive: true });
            window.addEventListener('webkitfullscreenchange', scheduleApply, { passive: true });
            window.addEventListener('orientationchange', function () { setTimeout(scheduleApply, 50); setTimeout(scheduleApply, 300); }, { passive: true });
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', scheduleApply, { passive: true });
                window.visualViewport.addEventListener('scroll', scheduleApply, { passive: true });
            }
        })();


        // weapp-adapter 依赖 GameGlobal 作为“平台全局对象”。浏览器中令其指向 window。
        window.GameGlobal = window;
        // 部分适配层会读取 __devtoolssubContext；不定义即走非子上下文路径。
    </script>
    <script src="fullscreen-toggle.js?v=cheat6"></script>
    <script src="wx-shim.js?v=cloud2"></script>
    <script src="mini-game-loader.js?v=cheat6"></script>
    <script src="laya-interceptor.js?v=cheat6"></script>
    <script src="cloud-config.js?v=cloud4"></script>
    <script src="browser-cloud.js?v=cloud2"></script>
    <script src="browser-pvp.js?v=pvp6"></script>
    <script src="gm-panel.js?v=gm2"></script>
    <script>
        // 启动流程：单机模式下 ZhaoCloud.start() 直接返回，无需等待登录。
        // 线上模式需先完成玩家身份确认和存档合并，再启动游戏。
        (async function bootAfterCloudLogin() {
            function loadScript(src) {
                return new Promise(function (resolve, reject) {
                    var script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = function () { reject(new Error('加载失败：' + src)); };
                    document.body.appendChild(script);
                });
            }

            try {
                window.ZhaoPvp.beforeCloudStart();
                await window.ZhaoCloud.start();
                window.ZhaoPvp.afterCloudStart();
                await loadScript('game.js?v=cloud1');
                await loadScript('input-fix.js?v=cheat6');
                await loadScript('unlock-features.js?v=cheat7');
                window.ZhaoCloud.onGameLoaded();
                window.ZhaoPvp.onGameLoaded();
            } catch (error) {
                console.error('[cloud boot]', error);
                window.ZhaoCloud.showFatal(error && error.message || '游戏启动失败，请刷新重试');
            }
        })();
    </script>
</body>
</html>
